version: '3.9'

services:
  tiger-claw-dev:
    build:
      context: ../../
      dockerfile: docker/customer/Dockerfile
    container_name: tiger-claw-dev
    volumes:
      - ../../:/workspace
      - tiger-claw-data:/root/.openclaw
    ports:
      - "18789:18789"
      - "4000:4000"
    environment:
      - TENANT_ID=dev-tenant-001
      - TENANT_NAME=Dev Tenant
      - PREFERRED_LANGUAGE=en
      - NODE_ENV=development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:14
    container_name: tiger-claw-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tiger_claw
      POSTGRES_USER: tigerclaw
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tiger-claw-redis-dev
    ports:
      - "6379:6379"

volumes:
  tiger-claw-data:
  postgres-data:
