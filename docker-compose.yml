version: '3.9'

services:
  db:
    image: postgres:14
    container_name: tiger-claw-postgres
    restart: always
    environment:
      POSTGRES_USER: botcraft
      POSTGRES_PASSWORD: REDACTED_DB_PASSWORD
      POSTGRES_DB: tiger_bot
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tiger-claw-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  api:
    build:
      context: ./api
    container_name: tiger-claw-api
    restart: on-failure
    depends_on:
      - db
      - redis
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://botcraft:REDACTED_DB_PASSWORD@db:5432/tiger_bot
      - REDIS_URL=redis://redis:6379
      - TIGER_CLAW_API_URL=https://hypocrateriform-revengingly-floy.ngrok-free.dev
    env_file:
      - ./api/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  redisdata:
